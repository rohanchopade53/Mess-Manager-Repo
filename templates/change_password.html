{% extends "base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="container">

    <div class="payment-card ui-card">

        <div class="page-heading">

            <h1 class="page-title">
                Change Password
            </h1>

            <p class="form-subtitle">
                Update your account password
            </p>

        </div>

        <form action="/change_password" method="POST">

            <div class="form-group">

                <label class="form-label">
                    Current Password
                </label>

                <input
                    type="password"
                    name="current_password"
                    class="form-input"
                    required
                >

            </div>

            <div class="form-group">

                <label class="form-label">
                    New Password
                </label>

                <input
                    type="password"
                    name="new_password"
                    class="form-input"
                    required
                >

            </div>

            <div class="form-group">

                <label class="form-label">
                    Confirm New Password
                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-input"
                    required
                >

            </div>

            <div class="form-actions">

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Update Password
                </button>

                <a
                    href="/profile"
                    class="secondary-btn"
                >
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
