<!DOCTYPE html>
<html>

<head>
    <title>Receive Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">

    <div class="logo">
        Mess Manager
    </div>

    <div class="nav-links">

        <a href="/">Dashboard</a>

        <a href="/student_list">Students</a>

        <a href="/pending_payments">Pending</a>

    </div>

</div>



<div class="container">

<h2>Receive Payment</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div class="alert">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


<div class="payment-card">

<label>Search Student</label>

<input type="text"
       id="searchBox"
       class="search-box"
       onkeyup="filterStudents()"
       placeholder="Type student name">

<div id="results" class="search-results"></div>


<form action="/receive_payment" method="POST">

<input type="hidden" name="student_id" id="student_id" required>


<p class="selected-student">
Selected Student:
<span id="selectedStudent">None</span>
</p>


<label>Enter Amount</label>

<input type="number"
       name="amount"
       id="amountInput"
       required>


<button type="submit">Receive Payment</button>

</form>

</div>


<br>

<a href="/">
<button>Back to Home</button>
</a>


<script>

let students = [
{% for student in students %}
{
    id: "{{ student[0] }}",
    name: "{{ student[1] }}",
    remaining: "{{ student[2] }}"
},
{% endfor %}
];


function filterStudents() {

    let input = document.getElementById("searchBox").value.toLowerCase();
    let results = document.getElementById("results");

    results.innerHTML = "";

    students.forEach(student => {

        if (student.name.toLowerCase().includes(input)) {

            let div = document.createElement("div");

            div.innerText = student.name;

            div.onclick = function() {

                document.getElementById("student_id").value = student.id;

                document.getElementById("selectedStudent").innerText =
                    student.name + " (Remaining: ₹" + student.remaining + ")";

                document.getElementById("amountInput").max = student.remaining;

                results.innerHTML = "";

            };

            results.appendChild(div);

        }

    });

}

</script>

</div>

</body>
</html>
