{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="student-form-card ui-card">

    <h1>Edit Student</h1>
    <p class="form-subtitle">
        Update student information and hostel details
    </p>

    <form action="/update_student" method="POST">

        <input type="hidden" name="student_id" value="{{ student['id'] }}">

        <div class="form-group">

            <label class="form-label">
                Name
            </label>

            <input type="text" name="name" class="form-input" value="{{ student['name'] }}" required>

        </div>


        <div class="form-group">

            <label class="form-label">
                Mobile
            </label>

            <input type="tel" name="mobile" class="form-input" maxlength="10" pattern="[0-9]{10}" inputmode="numeric"
                placeholder="Enter 10-digit mobile number" required>

        </div>

        <div class="form-group">

            <label class="form-label">
                Email Address
            </label>

            <input type="email" name="email" class="form-input" value="{{ student['email'] }}"
                placeholder="student@example.com">
        </div>

        <div class="form-group">

            <label class="form-label">
                Department
            </label>

            <select name="department" class="form-select" required>

                <option value="Engineering" {% if student['department']=='Engineering' %} selected {% endif %}>
                    Engineering
                </option>

                <option value="Diploma" {% if student['department']=='Diploma' %} selected {% endif %}>
                    Diploma
                </option>

                <option value="Pharmacy" {% if student['department']=='Pharmacy' %} selected {% endif %}>
                    Pharmacy
                </option>

                <option value="School" {% if student['department']=='School' %} selected {% endif %}>
                    School
                </option>

            </select>

        </div>


        <div class="form-group">

            <label class="form-label">
                Academic Level
            </label>

            <input type="text" name="academic_level" class="form-input" value="{{ student['academic_level'] }}"
                required>

        </div>


        <div class="form-group">

            <label class="form-label">
                Room
            </label>

            <input type="text" name="room" class="form-input" value="{{ student['room'] }}" required>

        </div>


        <div class="form-group">

            <label class="form-label">
                Hostel
            </label>

            <select name="hostel" class="form-select">

                <option value="Shivneri" {% if student['hostel']=='Shivneri' %} selected {% endif %}>
                    Shivneri
                </option>

                <option value="Raigad" {% if student['hostel']=='Raigad' %} selected {% endif %}>
                    Raigad
                </option>

                <option value="Rajgad" {% if student['hostel']=='Rajgad' %} selected {% endif %}>
                    Rajgad
                </option>

            </select>

        </div>


        <div class="form-actions">

            <button type="submit" class="primary-btn">
                Update Student
            </button>

            <a href="/student_list" class="secondary-btn">
                Back
            </a>

        </div>

    </form>

</div>


{% endblock %}
