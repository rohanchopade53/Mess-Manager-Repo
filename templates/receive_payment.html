{% extends "base.html" %}

{% block title %}
Receive Payment
{% endblock %}

{% block content %}

<div class="container">

    <div class="payment-card ui-card">

        <h1 class="page-title">
            Receive Payment
        </h1>


        <h2 class="payment-student-name">
            {{ student['name'] }}
        </h2>


        <div class="payment-summary">

            <span class="payment-label">
                Remaining Amount:
            </span>

            <span class="payment-value">
                ₹{{ student['total_fees'] - student['received_amount'] }}
            </span>

        </div>


        <form
            action="/receive_payment"
            method="POST"
        >

            <input
                type="hidden"
                name="student_id"
                value="{{ student['id'] }}"
            >


            <div class="form-group">

                <label class="form-label">
                    Enter Amount
                </label>

                <input
                    type="number"
                    name="amount"
                    class="form-input"
                    max="{{ student['total_fees'] - student['received_amount'] }}"
                    required
                >

            </div>


            

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Receive Payment
                </button>


                <a
                    href="/student_profile/{{ student['id'] }}"
                    class="secondary-btn"
                >
                    Back to Profile
                </a>

            

        </form>

    </div>

</div>

{% endblock %}
