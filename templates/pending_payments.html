<!DOCTYPE html>
<html>

<head>
    <title>Pending Payments</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="header">
    Mess Manager System
</div>

<div class="container">

<h2>Pending Payments</h2>

<table>

<tr>
<th>Name</th>
<th>Hostel</th>
<th>Remaining</th>
<th>Status</th>
<th>Profile</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[1] }}</td>

<td>{{ student[3] }}</td>

<td>₹{{ student[5] }}</td>

<td>

{% if student[4] == 0 %}

<span style="color:red; font-weight:bold;">
Unpaid
</span>

{% else %}

<span style="color:orange; font-weight:bold;">
Partial
</span>

{% endif %}

</td>

<td>

<a href="/student_profile/{{ student[0] }}">
<button>View Profile</button>
</a>

</td>

</tr>

{% endfor %}

</table>

<br>
<div class="export-button">
<a href="/download_pending_pdf">
    <button>Download PDF</button>
</a>
</div>
<br><br>

<a href="/" class="home-floating-btn">
    Home
</a>

</div>

</body>
</html>
