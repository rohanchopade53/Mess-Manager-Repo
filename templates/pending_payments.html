<!DOCTYPE html>
<html>

<head>
    <title>Pending Payments</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="topbar">

        <div class="logo">
            Mess Manager
        </div>

        <div class="nav-links">

            <a href="/">Dashboard</a>

            <a href="/student_list">Students</a>

            <a href="/pending_payments">Pending</a>

        </div>

    </div>



    <div class="container">

        <h2>Pending Payments</h2>
        <form method="GET" class="filter-form">

            <select name="payment_filter">

                <option value="">
                    All Pending
                </option>

                <option value="0_5000">
                    Remaining 0 - 5000
                </option>

                <option value="5000_15000">
                    Remaining 5000 - 15000
                </option>

                <option value="15000">
                    Remaining Above 15000
                </option>

            </select>

            <button type="submit">
                Filter
            </button>

        </form>

        <div class="export-button">
            <a href="/download_pending_pdf">
                <button>Download PDF</button>
            </a>
        </div>


        <div class="table-panel">

            <div class="table-container">

                <table class="students-table">

                    <tr>
                        <th>Name</th>
                        <th>Hostel</th>
                        <th>Remaining</th>
                        <th>Status</th>
                        <th>Profile</th>
                    </tr>

                    {% for student in students %}

                    <tr>

                        <td>{{ student[1] }}</td>

                        <td>{{ student[3] }}</td>

                        <td>₹{{ student[5] }}</td>

                        <td>

                            {% if student[4] == 0 %}

                            <span style="color:red; font-weight:bold;">
                                Unpaid
                            </span>

                            {% else %}

                            <span style="color:orange; font-weight:bold;">
                                Partial
                            </span>

                            {% endif %}

                        </td>

                        <td>

                            <a href="/student_profile/{{ student[0] }}" class="table-action-btn">

                                View Profile

                            </a>
                        </td>

                    </tr>

                    {% endfor %}

                </table>
            </div>
            <div>






            </div>



        </div>


    </div>

</body>

</html>
