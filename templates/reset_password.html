{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="container">

    <div class="payment-card ui-card">

        <div class="page-heading">

            <h1 class="page-title">
                Reset Password
            </h1>

            <p class="form-subtitle">
                Enter your new password.
            </p>

        </div>

        <form action="/reset_password" method="POST">

            <div class="form-group">

                <label class="form-label">
                    New Password
                </label>

                <input
                    type="password"
                    name="new_password"
                    class="form-input"
                    required
                >

            </div>

            <div class="form-group">

                <label class="form-label">
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-input"
                    required
                >

            </div>

            <div class="form-actions">

                <button
                    type="submit"
                    class="primary-btn">

                    Reset Password

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
